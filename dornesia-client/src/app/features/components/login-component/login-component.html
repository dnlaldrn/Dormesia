<div class="flex items-center justify-center min-h-[60vh] px-4">
    <div class="w-full max-w-md p-8 space-y-6 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-xl">
        <div class="text-center">
      <h2 class="text-3xl font-bold text-white tracking-tight">Access your account</h2>
      <p class="mt-2 text-sm text-gray-300">Hello User, Welcome back!</p>
    </div>
    <form [formGroup]="loginForm" (ngSubmit)=" onSubmit()">
        <div class="mt-2">
            <label class="block text-sm font-medium text-gray-200">Email Address</label>
             <input  class="w-full mt-1 px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="name@example.com">
        </div>
       <div class="mt-2">
        <label class="block text-sm font-medium text-gray-200">Password</label>
         <input class="w-full mt-1 px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="••••••••" type="password" >
       </div>
       
        <button type="submit" [disabled]="this.loginForm.invalid"
        class="w-full py-3 px-4 mt-4 bg-white text-blue-900 font-bold rounded-lg hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg active:scale-95">Login</button>

    </form>
   <div class="flex gap-4 justify-center">
     <p class="text-gray-300">New to the community?</p>
     <a routerLink="/sign-up" class="text-white font-semibold hover:underline cursor-pointer">Sign Up</a>
   </div>
</div>
</div>
