<section class="relative w-full overflow-hidden bg-white py-12 md:py-20">
  <div
    class="container mx-auto grid grid-cols-1 md:grid-cols-2 items-center gap-8 px-4 md:px-10 lg:px-20"
  >
    <!-- Left Content -->
    <div
      class="component flex flex-col items-start text-left order-2 md:order-1"
      [style.animation-delay.ms]="100"
    >
      <app-hero-section-component
        class="transition-all duration-700 ease-out"
        title="Your Perfect Dorm Awaits"
        description="Experience modern living with Stanza. Find the best dorms and apartments tailored to your student lifestyle in San Juan."
      ></app-hero-section-component>

      <div class="mt-6 md:px-5">
        <a
          routerLink="/sign-up"
          class="inline-block bg-black text-white px-8 py-3 rounded-full transition-all duration-700 delay-150 hover:bg-gray-800"
        >
          Get Started
        </a>
      </div>
    </div>

    <!-- Right Image (Semi-Circle) -->
    <div
      class="component relative order-1 md:order-2 flex justify-center md:justify-end transition-all duration-1000"
      [style.animation-delay.ms]="200"
    >
      <div
        class="w-full max-w-100 max-h-100 lg:max-w-500 aspect-auto overflow-hidden rounded-t-full rounded-b-full md:rounded-r-full"
      >
        <img
          class="h-full w-full object-cover"
          src="./assets/img/home-img.png"
          alt="Modern Apartment Interior"
        />
      </div>
    </div>
    <div class="order-3 md:col-span-2 px-4 md:px-5 lg:px-5">
      <p class="font-bold text-lg mb-3">Browse by Categories</p>
      <app-category-card-component></app-category-card-component>
    </div>

    <div class="order-3 md:col-span-2 lg:col-span-3 px-4 md:px-5 lg:px-5">
      <p class="font-bold text-lg mb-3">Featured</p>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (item of properties(); track $index) {
          @if ($index > 4) {
            <app-card-component
              [properties]="item"
              class="component"
              [style.animation-delay.ms]="200 * $index"
              [routerLink]="['/property', item.propertyId]"
            ></app-card-component>
          }
        }
      </div>
    </div>
  </div>
</section>
