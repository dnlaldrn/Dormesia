<section class="relative w-full overflow-hidden bg-white py-12 md:py-20">
  <div
    class="container mx-auto grid grid-cols-1 md:grid-cols-2 items-center gap-8 px-4 md:px-10 lg:px-20"
  >
    <!-- Left Content -->
    <div class="flex flex-col items-start text-left order-2 md:order-1">
      <app-hero-section-component
        [ngClass]="isRoute('/') ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-10 '"
        class="transition-all duration-700 ease-out"
        title="Your Perfect Dorm Awaits"
        description="Experience modern living with Stanza. Find the best dorms and apartments tailored to your student lifestyle in San Juan."
      ></app-hero-section-component>

      <div class="mt-6">
        <a
          routerLink="/sign-up"
          [ngClass]="isRoute('/') ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-10 '"
          class="inline-block bg-black text-white px-8 py-3 rounded-full transition-all duration-700 delay-150 hover:bg-gray-800"
        >
          Get Started
        </a>
      </div>
    </div>

    <!-- Right Image (Semi-Circle) -->
    <div
      [ngClass]="isRoute('/') ? 'opacity-100 scale-100' : 'opacity-0 scale-95'"
      class="relative order-1 md:order-2 flex justify-center md:justify-end transition-all duration-1000"
    >
      <div
        class="w-full max-w-100 max-h-100 lg:max-w-500 aspect-4/5 md:aspect-auto overflow-hidden rounded-t-full rounded-b-full md:rounded-r-full"
      >
        <img
          class="h-full w-full object-cover"
          src="./assets/img/home-img.png"
          alt="Modern Apartment Interior"
        />
      </div>
    </div>
  </div>
</section>
