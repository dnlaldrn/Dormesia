
<section class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

  <div class="max-w-xl w-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <!-- Header Section -->
    <div class="bg-indigo-600 px-8 py-10 text-center">
      <h1 class="text-3xl font-bold text-white mb-2">We value your feedback</h1>
      <p class="text-indigo-100 text-sm leading-relaxed">
        Our goal is to provide a seamless experience. If you find any bugs, kindly report them to me below so I can fix them promptly!
      </p>
    </div>

    <!-- Form Section -->
    <form class="p-8 space-y-6">
      
      <!-- Name & Email Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Your Name</label>
          <input type="text" placeholder="John Doe" 
                 class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
          <input type="email" placeholder="john@example.com" 
                 class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
        </div>
      </div>

      <!-- Report Type -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Feedback Type</label>
        <select class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all appearance-none">
          <option>General Feedback</option>
          <option>Bug Report / Technical Issue</option>
          <option>Feature Request</option>
          <option>Design Suggestion</option>
        </select>
      </div>

      <!-- Message -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Details</label>
        <textarea rows="4" placeholder="Describe the bug or share your thoughts..." 
                  class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"></textarea>
      </div>

      <!-- Submit Button -->
      <button type="submit" 
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg shadow-md hover:shadow-lg transition-all transform active:scale-[0.98]">
        Send Feedback
      </button>

    </form>

    <!-- Footer Note -->
    <div class="px-8 pb-8 text-center">
      <p class="text-xs text-slate-400">
        By submitting, you agree to share your input with our development team. 
        <br>Thank you for helping us improve!
      </p>
    </div>
  </div>

</section>
