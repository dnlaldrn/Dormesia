<div class="flex items-center justify-center min-h-[60vh] px-4">
  <div
    class="w-full max-w-md p-8 space-y-6 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-xl"
  >
    <div class="text-center">
      <h2 class="text-3xl font-bold text-white tracking-tight">Create Account</h2>
      <p class="mt-2 text-sm text-gray-300">Join the Dormesia community today.</p>
    </div>

    <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-200">Full Name</label>
        <input
          formControlName="fullName"
          type="text"
          class="w-full mt-1 px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
          placeholder="John Doe"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-200">Role</label>
        <input
          formControlName="role"
          type="text"
          list="roles"
          class="w-full mt-1 px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
          placeholder="(e.g.Border)"
        />
        <datalist id="roles">
          <option value="Border"></option>
          <option value="Landlord"></option>
        </datalist>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-200">Email Address</label>
        <input
          formControlName="email"
          type="email"
          class="w-full mt-1 px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
          placeholder="name@example.com"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-200">Password</label>
        <input
          formControlName="password"
          type="password"
          class="w-full mt-1 px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
          placeholder="••••••••"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-200">Confirm Password</label>
        <input
          formControlName="confirmPassword"
          type="password"
          class="w-full mt-1 px-4 py-3 bg-white/5 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
          placeholder="••••••••"
        />
        @if (signUpForm.hasError('mismatch') && signUpForm.get('confirmPassword')?.touched) {
          <p class="mt-1 text-xs text-red-400 font-medium">Passwords do not match.</p>
        }
      </div>

      <button
        type="submit"
        [disabled]="signUpForm.invalid"
        class="w-full py-3 px-4 mt-4 bg-white text-blue-900 font-bold rounded-lg hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg active:scale-95"
      >
        Sign Up
      </button>
    </form>

    <p class="text-center text-sm text-gray-300">
      Already have an account?
      <a routerLink="/login" class="text-white font-semibold hover:underline cursor-pointer"
        >Log in</a
      >
    </p>
  </div>
</div>
