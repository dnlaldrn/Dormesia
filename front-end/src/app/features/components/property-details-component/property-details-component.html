<section class="w-full overflow-hidden bg-white py-12 md:py-20">
  <div class="container gap-8 px-4 md:px-10 lg:px-20">
    <nav aria-label="Breadcrumb" class="flex gap-2 text-sm text-blue-600 mb-6">
      <a routerLink="/">Home</a> / 
      <a routerLink="/listings">Listing</a> / 
      <span class="text-gray-400">{{ property()?.propertyName }}</span>
    </nav>

    @if (property(); as data) {
      <main class="max-w-4xl mx-auto p-6">
        <h1 class="text-3xl font-bold">{{ data.propertyName }}</h1>
        <p class="text-gray-500">{{ data.category }} • {{ data.address }}</p>
        <div class="mt-6">
          <!-- Using NgOptimizedImage would be even better here! -->
          <img [src]="data.img" [alt]="data.propertyName" class="rounded-xl w-full object-cover h-96">
        </div>
        <p class="mt-4 text-2xl font-semibold">₱{{ data.price }} / month</p>
      </main>
    } @else {
      <div class="text-center py-20">
        <p>Property not found or loading...</p>
      </div>
    }
  </div>
</section>
