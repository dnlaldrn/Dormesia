<!-- Removed h-50 and added responsive grid-cols -->
<section class="w-full grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-10">
  @for (item of categoryitems; track $index) {
    <div class="w-full flex flex-col items-center">
      <!-- aspect-square ensures the box stays a perfect square regardless of width -->
      <div class="bg-blue-300 w-full aspect-square rounded-2xl transition-transform hover:scale-105 cursor-pointer">
      </div>
      <p class="mt-2 text-center text-sm md:text-base font-medium text-gray-700">
        {{item.description}}
      </p>
    </div>
  }
</section>
